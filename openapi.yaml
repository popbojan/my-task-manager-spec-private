openapi: 3.0.3
info:
  title: Task Manager API
  version: 1.3.0

paths:
  /users/me:
    get:
      summary: Get current user
      operationId: getCurrentUser
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: Current authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/me/preferences:
    patch:
      summary: Update current user's preferences
      operationId: updateUserPreferences
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserPreferencesRequest'
      responses:
        '200':
          description: User preferences successfully updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPreferencesResponse'
        '400':
          description: Bad Request (e.g. invalid language)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/request-otp:
    post:
      summary: Request a one-time password via email
      operationId: requestOtp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OTPRequest'
      responses:
        '200':
          description: OTP successfully sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "OTP sent to your email"
        '400':
          description: Bad Request (e.g. invalid email format)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login-with-otp:
    post:
      summary: Login using an email and the received OTP
      operationId: loginWithOtp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: OTP verified and access token generated. A refresh token cookie is set.
          headers:
            Set-Cookie:
              schema:
                type: string
              description: HttpOnly refresh token cookie (refreshToken=...; HttpOnly; Secure; SameSite=...)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid or expired OTP
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/refresh:
    post:
      summary: Refresh access token using refresh token cookie
      operationId: refreshAccessToken
      responses:
        '200':
          description: New access token issued. Refresh token cookie may be rotated.
          headers:
            Set-Cookie:
              schema:
                type: string
              description: HttpOnly refresh token cookie (refreshToken=...; HttpOnly; Secure; SameSite=...)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Missing, invalid, or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/logout:
    post:
      summary: Logout user and invalidate refresh token
      operationId: logout
      responses:
        '204':
          description: Successfully logged out. Refresh token cookie is cleared.
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Clears the refresh token cookie (refreshToken=; Max-Age=0; ...)
        '401':
          description: No valid refresh token provided
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tasks:
    get:
      summary: Get tasks for the authenticated user
      operationId: getTasks
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      summary: Create a new task
      operationId: createTask
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tasks/{taskId}:
    get:
      summary: Get a single task
      operationId: getTask
      security:
        - bearerAuth: [ ]
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    patch:
      summary: Update a task
      operationId: updateTask
      security:
        - bearerAuth: [ ]
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskRequest'
      responses:
        '200':
          description: Task updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      summary: Delete a task
      operationId: deleteTask
      security:
        - bearerAuth: [ ]
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Task deleted
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /recurring-tasks:
    get:
      summary: Get recurring tasks for the authenticated user
      description: Returns all recurring tasks owned by the authenticated user.
      operationId: getRecurringTasks
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: List of recurring tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RecurringTask'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      summary: Create a new recurring task
      description: Creates a daily, weekly, or monthly recurring task.
      operationId: createRecurringTask
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRecurringTaskRequest'
      responses:
        '201':
          description: Recurring task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecurringTask'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /recurring-tasks/{recurringTaskId}:
    get:
      summary: Get a single recurring task
      operationId: getRecurringTask
      security:
        - bearerAuth: [ ]
      parameters:
        - name: recurringTaskId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Recurring task found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecurringTask'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Recurring task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    patch:
      summary: Update a recurring task
      description: Updates title, description, status, or frequency of a recurring task.
      operationId: updateRecurringTask
      security:
        - bearerAuth: [ ]
      parameters:
        - name: recurringTaskId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRecurringTaskRequest'
      responses:
        '200':
          description: Recurring task updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecurringTask'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Recurring task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      summary: Delete a recurring task
      operationId: deleteRecurringTask
      security:
        - bearerAuth: [ ]
      parameters:
        - name: recurringTaskId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Recurring task deleted
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /mastery-levels:
    get:
      summary: Get all mastery levels
      description: Returns the complete ordered list of 24 mastery levels. This endpoint is public so the levels can be displayed before login.
      operationId: getMasteryLevels
      responses:
        '200':
          description: Ordered list of mastery levels
          content:
            application/json:
              schema:
                type: array
                minItems: 24
                maxItems: 24
                items:
                  $ref: '#/components/schemas/MasteryLevel'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /recurring-task-progress:
    get:
      summary: Get recurring task progress for the authenticated user
      description: Returns the user's global recurring-task streak, current mastery level, and highest achievements reached.
      operationId: getRecurringTaskProgress
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: Recurring task progress
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecurringTaskProgress'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Language:
      type: string
      enum:
        - sr
        - de
        - fr
        - en
      default: de
      example: de

    User:
      type: object
      required:
        - id
        - email
        - language
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        language:
          $ref: '#/components/schemas/Language'

    UpdateUserPreferencesRequest:
      type: object
      required:
        - language
      properties:
        language:
          $ref: '#/components/schemas/Language'

    UserPreferencesResponse:
      type: object
      required:
        - language
      properties:
        language:
          $ref: '#/components/schemas/Language'

    OTPRequest:
      type: object
      required:
        - email
        - language
      properties:
        email:
          type: string
          format: email
          example: "user@example.com"
        language:
          $ref: '#/components/schemas/Language'

    LoginRequest:
      type: object
      required:
        - email
        - otp
        - language
      properties:
        email:
          type: string
          format: email
          example: "user@example.com"
        otp:
          type: string
          example: "123456"
        language:
          $ref: '#/components/schemas/Language'

    LoginResponse:
      type: object
      required:
        - accessToken
      properties:
        accessToken:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."

    ErrorResponse:
      type: object
      properties:
        statusCode:
          type: integer
          example: 400
        error:
          type: string
          example: "Bad Request"
        message:
          type: string
          example: "body/email must match format \"email\""

    TaskStatus:
      type: string
      enum:
        - todo
        - in_progress
        - review
        - done

    TaskPriority:
      type: string
      enum:
        - none
        - important
        - urgent
        - important_urgent

    Task:
      type: object
      required:
        - id
        - title
        - status
        - priority
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          example: "My urgent task"
        description:
          type: string
          nullable: true
          example: "Fix login bug when access token expires"
        status:
          $ref: '#/components/schemas/TaskStatus'
        priority:
          $ref: '#/components/schemas/TaskPriority'
        deadline:
          type: string
          format: date-time
          nullable: true
          example: "2026-05-10T00:00:00.000Z"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateTaskRequest:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          example: "Login testen"
        description:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/TaskStatus'
        priority:
          $ref: '#/components/schemas/TaskPriority'
        deadline:
          type: string
          format: date-time
          nullable: true

    UpdateTaskRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/TaskStatus'
        priority:
          $ref: '#/components/schemas/TaskPriority'
        deadline:
          type: string
          format: date-time
          nullable: true

    RecurringTaskStatus:
      type: string
      description: Status of a recurring task. Recurring tasks do not have review.
      enum:
        - todo
        - in_progress
        - done

    RecurringFrequency:
      type: string
      description: Defines how often the task repeats.
      enum:
        - daily
        - weekly
        - monthly

    RecurringTask:
      type: object
      required:
        - id
        - title
        - status
        - frequency
        - streakCount
        - nextResetAt
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          example: "Learning German"
        description:
          type: string
          nullable: true
          example: "Reading or writing for 30 minutes"
        status:
          $ref: '#/components/schemas/RecurringTaskStatus'
        frequency:
          $ref: '#/components/schemas/RecurringFrequency'
        streakCount:
          type: integer
          description: Number of successful repetitions in a row.
          example: 7
        lastCompletedAt:
          type: string
          format: date-time
          nullable: true
          description: Last time this recurring task was marked as done.
          example: "2026-06-06T18:30:00.000Z"
        lastResetAt:
          type: string
          format: date-time
          nullable: true
          description: Last time the backend reset this task back to todo.
          example: "2026-06-07T00:00:00.000Z"
        nextResetAt:
          type: string
          format: date-time
          description: Next planned reset time calculated by the backend.
          example: "2026-06-07T00:00:00.000Z"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateRecurringTaskRequest:
      type: object
      required:
        - title
        - frequency
      properties:
        title:
          type: string
          example: "Learning German"
        description:
          type: string
          nullable: true
          example: "Reading or writing for 30 minutes"
        frequency:
          $ref: '#/components/schemas/RecurringFrequency'

    UpdateRecurringTaskRequest:
      type: object
      properties:
        title:
          type: string
          example: "Learning German"
        description:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/RecurringTaskStatus'
        frequency:
          $ref: '#/components/schemas/RecurringFrequency'

    MasteryLevel:
      type: object
      required:
        - id
        - number
        - nameEn
        - nameDe
        - nameFr
        - nameSr
        - avatarKey
        - avatarRevealed
        - requiredStreak
        - maxAllowedTasks
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        number:
          type: integer
          minimum: 1
          maximum: 24
          description: Unique mastery level number.
          example: 4
        nameEn:
          type: string
          example: "Disciplined Fighter"
        nameDe:
          type: string
          example: "Disziplinierter Kämpfer"
        nameFr:
          type: string
          example: "Combattant discipliné"
        nameSr:
          type: string
          example: "Disciplinovani borac"
        avatarKey:
          type: string
          description: Stable key used by the frontend to resolve the level avatar.
          example: "level-04-disciplined-fighter"
        avatarRevealed:
          type: boolean
          description: Whether the avatar may be displayed publicly.
          example: false
        requiredStreak:
          type: integer
          minimum: 0
          description: Minimum global daily streak required to reach this level.
          example: 90
        maxAllowedTasks:
          type: integer
          minimum: 1
          description: Maximum number of active recurring tasks allowed at this level.
          example: 4
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    RecurringTaskProgress:
      type: object
      required:
        - id
        - currentStreak
        - highestStreakReached
        - currentLevel
        - highestLevelReached
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        currentStreak:
          type: integer
          minimum: 0
          description: Current number of consecutive successful days on which all required daily recurring tasks were completed.
          example: 37
        highestStreakReached:
          type: integer
          minimum: 0
          description: Highest global recurring-task streak ever reached by the user. This value is not reduced when the current streak is lost.
          example: 94
        currentLevel:
          type: integer
          minimum: 1
          maximum: 24
          description: Current mastery level derived from the current streak. It can decrease after a failed day.
          example: 2
        highestLevelReached:
          type: integer
          minimum: 1
          maximum: 24
          description: Highest mastery level ever reached by the user. This value is not reduced when the current streak is lost.
          example: 4
        lastSuccessfulDay:
          type: string
          format: date-time
          nullable: true
          description: Most recent day on which all required daily recurring tasks were completed.
          example: "2026-07-14T00:00:00.000Z"
        lastCheckedAt:
          type: string
          format: date-time
          nullable: true
          description: Last time the backend evaluated the user's global recurring-task progress.
          example: "2026-07-15T00:00:00.000Z"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time