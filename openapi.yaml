openapi: 3.0.3
info:
  title: Task Manager API
  version: 1.0.5

paths:
  /auth/request-otp:
    post:
      summary: Request a one-time password via email
      operationId: requestOtp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OTPRequest'
      responses:
        '200':
          description: OTP successfully sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "OTP sent to your email"
        '400':
          description: Bad Request (e.g. invalid email format)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login-with-otp:
    post:
      summary: Login using an email and the received OTP
      operationId: loginWithOtp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: OTP verified and access token generated. A refresh token cookie is set.
          headers:
            Set-Cookie:
              schema:
                type: string
              description: HttpOnly refresh token cookie (refreshToken=...; HttpOnly; Secure; SameSite=...)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid or expired OTP
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/refresh:
    post:
      summary: Refresh access token using refresh token cookie
      operationId: refreshAccessToken
      responses:
        '200':
          description: New access token issued. Refresh token cookie may be rotated.
          headers:
            Set-Cookie:
              schema:
                type: string
              description: HttpOnly refresh token cookie (refreshToken=...; HttpOnly; Secure; SameSite=...)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Missing, invalid, or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/logout:
    post:
      summary: Logout user and invalidate refresh token
      operationId: logout
      responses:
        '204':
          description: Successfully logged out. Refresh token cookie is cleared.
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Clears the refresh token cookie (refreshToken=; Max-Age=0; ...)
        '401':
          description: No valid refresh token provided
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    OTPRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          example: "user@example.com"

    LoginRequest:
      type: object
      required:
        - email
        - otp
      properties:
        email:
          type: string
          format: email
          example: "user@example.com"
        otp:
          type: string
          example: "123456"

    LoginResponse:
      type: object
      required:
        - accessToken
      properties:
        accessToken:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."

    ErrorResponse:
      type: object
      properties:
        statusCode:
          type: integer
          example: 400
        error:
          type: string
          example: "Bad Request"
        message:
          type: string
          example: "body/email must match format \"email\""